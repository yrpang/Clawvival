name: Codex Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex:
    name: Codex PR Review
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: read-only
          prompt: |
            Review ONLY the changes introduced by PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            Use this diff range as the review scope:
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Focus on:
            - bugs or behavioral regressions
            - contract drift against current tests/docs
            - missing test coverage for changed behavior
            - risky CI/CD workflow or migration changes

            Keep the review concise.
            If there are no findings, say exactly: No findings.

            Pull request title:
            ${{ github.event.pull_request.title }}

            Pull request body:
            ${{ github.event.pull_request.body }}

  post-feedback:
    name: Post Codex Review
    needs: codex
    if: needs.codex.outputs.final_message != ''
    runs-on: ubuntu-latest
    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = process.env.CODEX_FINAL_MESSAGE;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
