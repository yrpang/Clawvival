name: Post Deploy Regression

on:
  workflow_run:
    workflows:
      - Fly Deploy
      - Web Pages
    types:
      - completed

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  api-regression:
    if: github.event.workflow_run.name == 'Fly Deploy' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run remote API regression
        id: run_api
        run: go test -tags=e2e ./tests/e2e -v
        continue-on-error: true

      - name: Summarize API regression result
        if: always()
        run: |
          if [ "${{ steps.run_api.outcome }}" = "success" ]; then
            echo "## Post-deploy API regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Status: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Post-deploy API regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Status: failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish API regression check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const success = "${{ steps.run_api.outcome }}" === "success";
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "Post Deploy Regression / API",
              head_sha: sha,
              status: "completed",
              conclusion: success ? "success" : "failure",
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              output: {
                title: success ? "Post-deploy API regression passed" : "Post-deploy API regression failed",
                summary: success
                  ? "Remote API e2e regression passed after deploy."
                  : "Remote API e2e regression failed after deploy. Open the workflow run for the failing e2e case."
              }
            });

      - name: Create issue for API regression failure
        if: steps.run_api.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const shortSha = sha.slice(0, 7);
            const title = `[Post Deploy Regression][API] failure on ${shortSha}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "bug",
              per_page: 100,
            });
            const existing = openIssues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) {
              core.info(`Open issue already exists: #${existing.number} ${existing.title}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "Post-deploy API regression failed on `main`.",
                "",
                `Commit: \`${sha}\``,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                "",
                "Check the `api-regression` job log for the failing e2e case."
              ].join("\n"),
              labels: ["bug"]
            });

      - name: Fail workflow on API regression failure
        if: steps.run_api.outcome == 'failure'
        run: exit 1

  web-regression:
    if: github.event.workflow_run.name == 'Web Pages' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check homepage
        id: check_homepage
        run: curl -fsSL --retry 6 --retry-all-errors --retry-delay 5 https://clawvival.app/ | grep -q '<div id="root"></div>'
        continue-on-error: true

      - name: Check skills index
        id: check_skills_index
        if: steps.check_homepage.outcome == 'success'
        run: curl -fsSL --retry 6 --retry-all-errors --retry-delay 5 https://clawvival.app/skills/index.json | grep -q '"name":[[:space:]]*"survival"'
        continue-on-error: true

      - name: Check survival skill bundle
        id: check_skill_bundle
        if: steps.check_homepage.outcome == 'success' && steps.check_skills_index.outcome == 'success'
        run: curl -fsSL --retry 6 --retry-all-errors --retry-delay 5 https://clawvival.app/skills/survival/skill.md > /tmp/clawvival-skill.md && test -s /tmp/clawvival-skill.md
        continue-on-error: true

      - name: Summarize web regression result
        if: always()
        run: |
          if [ "${{ steps.check_homepage.outcome }}" = "success" ] && \
             [ "${{ steps.check_skills_index.outcome }}" != "failure" ] && \
             [ "${{ steps.check_skill_bundle.outcome }}" != "failure" ]; then
            echo "## Post-deploy web regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Status: passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Post-deploy web regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Status: failed" >> "$GITHUB_STEP_SUMMARY"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish web regression check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const success =
              "${{ steps.check_homepage.outcome }}" === "success" &&
              "${{ steps.check_skills_index.outcome }}" !== "failure" &&
              "${{ steps.check_skill_bundle.outcome }}" !== "failure";
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "Post Deploy Regression / Web",
              head_sha: sha,
              status: "completed",
              conclusion: success ? "success" : "failure",
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              output: {
                title: success ? "Post-deploy web regression passed" : "Post-deploy web regression failed",
                summary: success
                  ? "Web smoke regression passed after deploy."
                  : "Web smoke regression failed after deploy. Open the workflow run for the failing smoke step."
              }
            });

      - name: Create issue for web regression failure
        if: steps.check_homepage.outcome == 'failure' || steps.check_skills_index.outcome == 'failure' || steps.check_skill_bundle.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const shortSha = sha.slice(0, 7);
            const title = `[Post Deploy Regression][Web] failure on ${shortSha}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "bug",
              per_page: 100,
            });
            const existing = openIssues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) {
              core.info(`Open issue already exists: #${existing.number} ${existing.title}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "Post-deploy web regression failed on `main`.",
                "",
                `Commit: \`${sha}\``,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                "",
                "Check the `web-regression` job log for the failing smoke step."
              ].join("\n"),
              labels: ["bug"]
            });

      - name: Fail workflow on web regression failure
        if: steps.check_homepage.outcome == 'failure' || steps.check_skills_index.outcome == 'failure' || steps.check_skill_bundle.outcome == 'failure'
        run: exit 1
